syntax = "proto3";

option java_package = "com.example.kv";
option java_multiple_files = true;

service KvService {
  rpc put(PutRequest) returns (Empty);
  rpc get(GetRequest) returns (GetResponse);
  rpc delete(DeleteRequest) returns (Empty);
  rpc range(RangeRequest) returns (stream KvPair);
  rpc count(Empty) returns (CountResponse);
}

message PutRequest {
  string key = 1;
  bytes value = 2;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
  bool found = 2;
}

message DeleteRequest {
  string key = 1;
}

message RangeRequest {
  string from = 1;
  string to = 2;
}

message KvPair {
  string key = 1;
  bytes value = 2;
}

message CountResponse {
  int64 count = 1;
}

message Empty {}